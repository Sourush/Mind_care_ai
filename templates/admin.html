<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body {
    background: #020617;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-box {
    background: #0f172a;
    padding: 40px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #020617;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: #2563eb;
    border: none;
    color: white;
}
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    opacity: 0.25;
    pointer-events: none;
}
</style>
</head>
<body>
    <video autoplay muted loop id="bg-video">
<source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
</video>
<div class="login-box">
    <h2><font color="white">Admin Login</font></h2>
    <form action="/admin/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
