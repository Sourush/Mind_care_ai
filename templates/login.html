<!DOCTYPE html>
<html>
<head>
<title>MindCare AI - Login</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    opacity: 0.25;
    pointer-events: none;
}
.login-box {
    background: #0f172a;
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
#typingText {
    font-size: 16px;
    margin-bottom: 20px;
    color: #93c5fd;
}
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #020617;
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    background: #2563eb;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
}
.login-box {
    background: rgba(15, 23, 42, 0.9);
    padding: 50px;
    border-radius: 20px;
    width: 360px;  
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 
        0 0 20px rgba(59,130,246,0.2),
        0 0 60px rgba(59,130,246,0.1);
}
#bgText {
    position: fixed;
    top: 11%;
    left: 80px; 
    transform: translateY(-50%);
    width: 400px;

    font-size: 24px;
    font-weight: 500;
    line-height: 1.5;

    color: rgba(255, 255, 255, 0.634);

    pointer-events: none;
    z-index: 0;
}
.navbar {
    position: fixed;
    top: 20px;
    right: 40px;
    z-index: 10;
}
.navbar a {
    margin-left: 20px;
    text-decoration: none;
    color: #cbd5f5;
    font-size: 14px;
    transition: 0.3s;
}
.navbar a:hover {
    color: white;
    text-shadow: 0 0 10px rgba(59,130,246,0.8);
}
</style>
</head>
<body>
<div class="navbar">
    <a href="/about">About</a>
    <a href="/therapy">Therapy</a>
    <a href="/faq">FAQ</a>
    <a href="/train-page">Train Your AI</a>
    <a href="/contact">Contact Us</a>
    <a href="/resources">Vision & Mission</a>
</div>
<video autoplay muted loop playsinline id="bg-video">
<source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
</video>
<div id="bgText"></div>
<script>
let text = "Welcome to MindCare AI... Your personal mental wellness companion. Talk freely. Heal deeply. You are not alone.";
let i = 0;
function typeBackground() {
    if (i < text.length) {
        document.getElementById("bgText").innerHTML += text[i];
        i++;
        setTimeout(typeBackground, 40);
    }
}
typeBackground();
</script>
<div class="login-box">
    <h2 style="color:white;">MindCare AI</h2>
    <p id="typingText"></p>
    <form method="POST">
        <input type="text" name="username" placeholder="Enter your name..." required>
        <button type="submit">Enter</button>
    </form>
    <p style="margin-top:15px; font-size:13px; color:#94a3b8;">
        or
    </p>
    <a href="/admin" style="
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#dc2626;
    border-radius:10px;
    color:white;
    text-decoration:none;
    ">
    Login as Admin
    </a>
</div>
</script>
</body>
</html>
