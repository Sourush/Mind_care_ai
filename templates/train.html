<!DOCTYPE html>
<html>
<head>
<title>Train Your AI - MindCare</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: white;
}
#bg-video {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    opacity: 0.25;
}
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.train-box {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 500px;
    box-shadow:
        0 0 20px rgba(59,130,246,0.2),
        0 0 60px rgba(59,130,246,0.1);
}
h2 {
    text-align: center;
    margin-bottom: 10px;
}
.desc {
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
    margin-bottom: 20px;
}
textarea {
    width: 100%;
    height: 180px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #020617;
    color: white;
    resize: none;
}
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: #2563eb;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
}
.back {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #93c5fd;
    text-decoration: none;
}
</style>
</head>
<body>
<video autoplay muted loop playsinline id="bg-video">
<source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
</video>
<div class="container">
    <div class="train-box">
        <h2>🧠 Train Your AI</h2>
        <p class="desc">
            Paste your chats (WhatsApp, messages, etc.)  
            AI will learn your tone and reply like YOU 
        </p>
        <textarea id="chatData" placeholder="Paste your chats here..."></textarea>
        <button onclick="trainAI()">Train AI</button>
        <a href="/login" class="back">← Back</a>
    </div>
</div>
<script>
async function trainAI() {
    let data = document.getElementById("chatData").value;
    if (!data) {
        alert("Please paste some chats first 😄");
        return;
    }    await fetch("/train", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({chat: data})
    });
    alert("🔥 AI trained!");
    window.location.href = "/clone";
}
</script>
</body>
</html>
